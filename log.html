<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventory Login Portal</title> 

  <!-- Link CSS file 
  <link rel="stylesheet" href="log.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="login-container">
    <div class="logo">Office <span>Inventory</span></div>

    <h2>Sign In</h2>

    <form>
      <div class="input-group">
        <input type="email" placeholder="Email address" required />
      </div>

      <div class="input-group">
        <input type="password" placeholder="Password" required />

      
      <div class="input-group">
        <input type="Division" placeholder="Division" required />
      </div>

      <button class="login-btn">Login</button>
    </form>

    
    
    

  
    </div>

    <div class="footer">
    </div>
  </div>

</body>
</html>
