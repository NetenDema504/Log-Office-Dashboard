<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Inventory Request System</title>
    <link rel="stylesheet" href="User.css">
</head>
<body>

<header>
    <h1>Office Inventory System</h1>
</header>

<div class="container">

    <!-- Request Form -->
    <section class="request-form">
        <h2>Request Item</h2>
        <form>
            <input type="text" placeholder="Your Name" required>

            <select required>
                <option value="">Select Item</option>
                <option>Notepad</option>
                <option>Snacks</option>
                <option>Slippers</option>
                <option>Stationery</option>
            </select>

            <input type="number" placeholder="Quantity" required>

            <textarea placeholder="Reason (optional)"></textarea>

            <button type="submit">Submit Request</button>
        </form>
    </section>

    <!-- Request Status -->
    <section class="request-status">
        <h2>My Requests</h2>
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Qty</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Notepad</td>
                    <td>5</td>
                    <td class="pending">Pending</td>
                </tr>
                <tr>
                    <td>Snacks</td>
                    <td>2</td>
                    <td class="approved">Approved</td>
                </tr>
                <tr>
                    <td>Slippers</td>
                    <td>1</td>
                    <td class="rejected">Rejected</td>
                </tr>
            </tbody>
        </table>
    </section>

    <!-- Inventory Overview -->
    <section class="inventory">
        <h2>Available Inventory</h2>
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Category</th>
                    <th>Available Qty</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Notepad</td>
                    <td>Stationery</td>
                    <td>50</td>
                </tr>
                <tr>
                    <td>Snacks</td>
                    <td>Food</td>
                    <td>20</td>
                </tr>
                <tr>
                    <td>Slippers</td>
                    <td>Office Supplies</td>
                    <td>15</td>
                </tr>
            </tbody>
        </table>
    </section>

    <!-- Inventory Management (Admin View UI only) -->
    <section class="manage-inventory">
        <h2>Manage Inventory</h2>
        <form>
            <input type="text" placeholder="Item Name">
            <input type="number" placeholder="Add Quantity">
            <button type="submit">Update Stock</button>
        </form>
    </section>

</div>

</body>
</html>
